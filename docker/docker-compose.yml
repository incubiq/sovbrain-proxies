# sovBrain BYO AI Proxy — local / single-host deployment
#
# 1. Copy .env.example to .env and fill in the upstream(s) you want
#    (multi-upstream: ANTHROPIC_API_KEY / OPENAI_API_KEY / OLLAMA_URL)
# 2. docker compose up -d
# 3. Verify: curl http://localhost:8787/health  -> "ok"

services:
  sovbrain-proxy:
    build: .
    image: sovbrain-proxy:latest
    container_name: sovbrain-proxy
    restart: unless-stopped
    ports:
      - "8787:8787"
    env_file:
      - .env
    healthcheck:
      test: ["CMD", "wget", "-q", "-O-", "http://127.0.0.1:8787/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 5s
